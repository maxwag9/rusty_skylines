name: checkbox_ticked
elements:
  # Soft outer border
  - !Rect
    id: Checkbox Border
    actions:
      - on:release, set_setting_to(ap, bool:false)
    x: 0.0
    y: 0.0
    w: 0.02
    h: 0.02
    color:
      - 0.00
      - 0.00
      - 0.00
      - 1.0
    border_color:
      - 1.0
      - 1.0
      - 1.0
      - 1.0
    roundness: 0.1
    border_thickness_percentage: 0.05
  # inner indicator
  - !Rect
    id: Checkbox Indicator
    actions:
      - on:release, set_setting_to(ap, bool:false)
    x: 0.0
    y: 0.0
    w: 0.010
    h: 0.010
    color:
      - 0.00
      - 0.50
      - 0.0
      - 1.0
    roundness: 0.5
  - !Text
    id: setting_text
    x: 0.02
    y: 0.0
    pt: 15.0
    color:
      - 1.0
      - 1.0
      - 1.0
      - 1.0
    text: '{ap}'