name: zoning_demand_indicator
elements:
  # Soft outer border
  - !Rect
    id: Zoning Border
    actions:
      - on:activated button:a, set(str:zoning_demand_indicator_{ap}_border_height, self.size.y)
      - on:activated button:a, set(str:zoning_demand_indicator_{ap}_border_y, self.center.y)
    x: 0.0
    y: 0.0
    w: 0.0105
    h: 0.011
    color:
      - 0.00
      - 0.00
      - 0.00
      - 0.4
    border_color:
      - 1.0
      - 1.0
      - 1.0
      - 0.2
    roundness: 0.05
    border_thickness_percentage: 0.04
  # inner indicator
  - !Rect
    id: Zoning Indicator
    actions:
      - on:a button:a set(str:self.size.y, {zoning_demand_indicator_{ap}_border_height}*{{ap}})
      - on:a button:a set(str:self.center.y,
        ({zoning_demand_indicator_{ap}_border_y} + 0.5 * {zoning_demand_indicator_{ap}_border_height})
        - 0.5 * ({zoning_demand_indicator_{ap}_border_height}*{{ap}})
        )
      - button:a show_interaction(self.color.fill)
      #- on:release, ifvareq(str:{ap}, bool:false, set_var(str:self.color.fill, [0.5, 0.0, 0.0, 1.0]), set_var(str:self.color.fill, [0.0, 0.5, 0.0, 1.0]))
    x: 0.0
    y: 0.0
    w: 0.010
    h: 0.010
    color:
      - 0.00
      - 0.50
      - 0.0
      - 0.9
    roundness: 0.1
  - !Text
    id: zoning_value_text
    x: 0.00
    y: 0.00
    pt: 8.0
    color:
      - 0.94
      - 0.02
      - 0.09
      - 0.9
    text: '{{{ap}}:.2}'
    anchor: Center