name: dropdown_option
elements:
  - !Rect
    id: Option Background
    actions:
      #- on:release button:left print(it works?!))
      # Clicking updates the main dropdown variable to this option's value
      #- on:release button:left set({{ap}_parent}, {{ap}})
      # Clicking closes the dropdown menu
      #- on:release button:left, print(Name in option:, strexpr:{split("{ap}", ".").0}_open))
      #- on:release button:left, print(Before:, {split("{ap}", ".").0}_open)

      - on:release button:left, set(strexpr:{split("{ap}", ".").0}_open, false)
      #- on:release button:left, print({split("{ap}", ".").0}.options)
      #- on:release button:left, print({split("{ap}", ".").0}, {ap})
      #- on:release button:left, print(strexpr:dd_{split("{ap}", ".").0}_layer)
      #- on:release button:left, print(strexpr:{split("{ap}", ".").0}_open)
      #- on:release button:left, print({split("{ap}", ".").0}_open)
      #- on:release button:left, print(split("{ap}", ".").0)
      #- on:release button:left, print({ap})
      - on:release button:left, set(strexpr:split("{ap}", ".").0, {ap})
      - on:release button:left, ifvareq({split("{ap}", ".").0}_open, bool:false, forin({split("{ap}", ".").0}.options, del_ap(self.menu, strexpr:dd_{split("{ap}", ".").0}_layer, strexpr:{split("{ap}", ".").0}_Option_{idx})))
      #- on:release button:left, print(After:, {split("{ap}", ".").0}_open)
      - button:a show_interaction(self.color.fill)
    x: 0.0
    y: 0.0
    w: 0.15
    h: 0.03
    color:
      - 0.2
      - 0.2
      - 0.2
      - 1.0
    border_color:
      - 1.0
      - 1.0
      - 1.0
      - 0.5
    roundness: 0.1
    border_thickness_percentage: 0.05

  - !Text
    id: Option Text
    x: 0.000
    y: 0.005
    pt: 10.0
    color:
      - 1.0
      - 1.0
      - 1.0
      - 1.0
    text: "{{ap}}"
    anchor: Center