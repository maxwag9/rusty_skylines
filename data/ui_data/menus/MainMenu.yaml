name: MainMenu
layers:
  - name: main_menu_buttons
    order: 2
    elements:
      - !Rect
        id: Buttons Background
        actions: [ ]
        x: 0.5
        y: 0.4
        w: 0.2
        h: 0.3
        rotation: 0.0
        color:
          - 0.01
          - 0.01
          - 0.01
          - 1.0
        border_color:
          - 1.0
          - 1.0
          - 1.0
          - 1.0
        texture: null
        roundness: 0.2
        border_thickness_percentage: 0.01
        fade: 0.0
        misc:
          active: true
          pressable: false
          editable: true
      - !Text
        id: play_text
        actions:
          - on:r set(show_world, true)
          - on:r set(editor_mode, false)
          - on:r set(override_mode, false)
          - on:r close_all_menus
          - on:r open_menu(Debug_Menu)
          - on:r load_save(first_save_ever, false)
        x: 0.5
        y: 0.3
        pt: 20.0
        color:
          - 1.0
          - 1.0
          - 1.0
          - 1.0
        text: Play
        misc:
          active: true
          pressable: false
          editable: true
      - !Text
        id: settings_text
        actions:
          - on:r set(editor_mode, false)
          - on:r set(override_mode, false)
          - on:r close_all_menus
          - on:r open_menu(Settings)
        x: 0.5
        y: 0.35
        pt: 15.0
        color:
          - 1.0
          - 1.0
          - 1.0
          - 1.0
        text: Settings
      - !Text
        id: exit_text
        actions:
          - on:r exit
        x: 0.5
        y: 0.4
        pt: 15.0
        color:
          - 0.1
          - 0.1
          - 1.0
          - 1.0
        text: Exit Game
