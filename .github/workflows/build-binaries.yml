name: Build & Release Rust Game

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag name for release (e.g. Alpha_v1.0.0a)"
        required: true

jobs:
  build:
    name: Build for all platforms
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            artifact_name: linux-x86_64

          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            ext: ""
            artifact_name: linux-arm64

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            artifact_name: windows-x86_64

          # Windows ARM64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            ext: ".exe"
            artifact_name: windows-arm64

          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
            artifact_name: macos-x86_64

          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            artifact_name: macos-arm64

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies & Cross-Compilation Setup
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo dpkg --add-architecture arm64
            
            # Point apt to ports.ubuntu.com for arm64 packages
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ noble main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ noble-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ noble-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
            
            # Restrict default ubuntu.sources to amd64 only to prevent 404s
            sudo sed -i 's/Types: deb/Types: deb\nArchitectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources
            
            sudo apt-get update
            sudo apt-get install -y gcc-aarch64-linux-gnu libasound2-dev:arm64 libudev-dev:arm64
            
            mkdir -p .cargo
            cat <<EOF > .cargo/config.toml
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF
            echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
            echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          else
            sudo apt-get install -y libasound2-dev libudev-dev
          fi

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install pkg-config cmake

      - name: Install Windows system dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install cmake -y

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          GAME_NAME="RustySkylines"
          VERSION="${{ github.event.inputs.release_tag }}"
          OUTDIR="artifacts/${{ matrix.artifact_name }}"
          mkdir -p "$OUTDIR"
          BIN_PATH="target/${{ matrix.target }}/release"
          find "$BIN_PATH" -maxdepth 1 -type f -perm -u+x ! -name "*.d" ! -name "*.rlib" -exec cp {} "$OUTDIR/" \;
          
          # place "data" next to the binary
          if [ -d "data" ]; then cp -r data "$OUTDIR/data"; fi
          
          # Create tar.gz directly in the workspace root using -C
          tar -czf "${GAME_NAME}_${VERSION}_${{ matrix.artifact_name }}.tar.gz" -C "$OUTDIR" .

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $GameName = "RustySkylines"
          $Version = "${{ github.event.inputs.release_tag }}"
          $OutDir = "artifacts/${{ matrix.artifact_name }}"
          New-Item -ItemType Directory -Force -Path $OutDir | Out-Null
          $BinPath = "target/${{ matrix.target }}/release"
          
          $exeFiles = Get-ChildItem -Path $BinPath -Filter "*.exe" -ErrorAction SilentlyContinue
          if ($exeFiles) {
            Copy-Item "$BinPath\*.exe" $OutDir
          } else {
            Write-Warning "No .exe files found in $BinPath"
          }
          
          # place "data" next to the binary
          if (Test-Path "data") { Copy-Item -Recurse -Force "data" "$OutDir\data" }
          
          $items = Get-ChildItem -Path $OutDir -Recurse
          if (-not $items) {
            Write-Error "No artifacts found to compress in $OutDir"
            exit 1
          }
          
          Compress-Archive -Path "$OutDir\*" -DestinationPath "RustySkylines_${Version}_${{ matrix.artifact_name }}.zip"

      - name: Upload compressed artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}-package
          path: |
            RustySkylines_${{ github.event.inputs.release_tag }}_${{ matrix.artifact_name }}.zip
            RustySkylines_${{ github.event.inputs.release_tag }}_${{ matrix.artifact_name }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Gather release notes
        id: notes
        run: |
          DESC=$(git log -1 --pretty=%B)
          {
            echo "desc<<EOF"
            echo "$DESC"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: RustySkylines ${{ github.event.inputs.release_tag }}
          body: ${{ steps.notes.outputs.desc }}
          files: artifacts/**/*.zip,artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
